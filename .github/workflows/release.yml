name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: desktop-app
        run: npm install

      - name: Build Tauri app (app bundle only)
        working-directory: desktop-app
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles app

      - name: Prepare app for distribution
        run: |
          APP_PATH="desktop-app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/ToneGet.app"
          
          # Remove quarantine attributes
          xattr -cr "$APP_PATH"
          
          # Ad-hoc codesign
          codesign --force --deep --sign - "$APP_PATH"
          
          echo "App prepared at $APP_PATH"

      - name: Create DMG with Applications shortcut
        run: |
          APP_PATH="desktop-app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/ToneGet.app"
          DMG_DIR="desktop-app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          mkdir -p "$DMG_DIR"
          
          # Create a temporary folder with the app and Applications symlink
          WORK_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$WORK_DIR/"
          ln -s /Applications "$WORK_DIR/Applications"
          
          # Get version from git tag (strips the 'v' prefix)
          VERSION=${GITHUB_REF_NAME#v}
          
          # Determine DMG name based on architecture
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            DMG_NAME="ToneGet_${VERSION}_aarch64.dmg"
          else
            DMG_NAME="ToneGet_${VERSION}_x64.dmg"
          fi
          
          # Create the DMG directly
          hdiutil create -volname "ToneGet" -srcfolder "$WORK_DIR" -ov -format UDZO "$DMG_DIR/$DMG_NAME"
          
          echo "DMG created at $DMG_DIR/$DMG_NAME"
          ls -la "$DMG_DIR"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            desktop-app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: desktop-app
        run: npm install

      - name: Build Tauri app
        working-directory: desktop-app
        run: npm run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            desktop-app/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation Instructions
            
            ### macOS
            1. Download the `.dmg` file for your Mac:
               - **Apple Silicon (M1/M2/M3/M4)**: `ToneGet_*_aarch64.dmg`
               - **Intel Macs**: `ToneGet_*_x64.dmg`
            2. Open the DMG and drag ToneGet to Applications
            3. **First launch** (one-time setup):
               - Double-click ToneGet in Applications
               - You'll see: *"Apple could not verify ToneGet is free of malware"*
               - Click **Done** (not "Move to Trash")
               - Open **System Settings → Privacy & Security**
               - Scroll to the bottom—you'll see *"ToneGet was blocked"*
               - Click **Open Anyway**, then **Open**
            4. After this, ToneGet opens normally
            
            ### Windows
            1. Download and run the `.exe` installer
            2. If Windows Defender warns you, click "More info" → "Run anyway"
